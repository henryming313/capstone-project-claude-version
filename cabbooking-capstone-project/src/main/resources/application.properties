# ===== Server =====
server.port=8081

# ===== Datasource =====
# Update username/password to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/cabbooking_mvp?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=Root@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# ddl-auto=update creates/updates tables from the entity classes below -
# there is no need to manually import a schema .sql file.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Run data.sql (seed data) AFTER Hibernate creates the schema.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== SpringDoc / Swagger UI =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
